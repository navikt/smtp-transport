job {
    initialDelay = "30s"
    fixedInterval = "5m"
}

mail {
    inboxLimit = "${{env:INBOX_LIMIT:-2000}}"
}

ebms {
    providerUrl = "${{env:URL_EBMS_PROVIDER:-http://ebms-provider}}/ebms/async"
}

kafka {
    bootstrapServers = "${{env:KAFKA_BROKERS:-http://locahost:9092}}"
    securityProtocol = "SSL"
    keystoreType = "PKCS12"
    keystoreLocation = "${{ env:KAFKA_KEYSTORE_PATH :- }}"
    keystorePassword = "${{ env:KAFKA_CREDSTORE_PASSWORD :- }}"
    truststoreType = "JKS"
    truststoreLocation = "${{ env:KAFKA_TRUSTSTORE_PATH :- }}"
    truststorePassword = "${{ env:KAFKA_CREDSTORE_PASSWORD :- }}"
    payloadTopic = "team-emottak.smtp.in.ebxml.payload"
    signalTopic = "team-emottak.smtp.in.ebxml.signal"
    groupId = "smtp-transport"
}

smtp {
    username = "${{env:SMTP_INCOMING_USERNAME:-test@test.test}}"
    password = "${{env:SMTP_PASSWORD:-changeit}}"
    smtpPort = "${{env:SMTP_PORT:-3025}}"
    pop3Port = "${{env:SMTP_POP3_PORT:-3110}}"
    imapPort = "143"
    smtpHost = "${{env:SMTP_HOST:-localhost}}"
    pop3Host = "${{env:SMTP_POP3_HOST:-localhost}}"
    imapHost = "d32mxvl002.oera-t.local"
    storeProtocol = "${{env:SMTP_STORE_PROTOCOL:-pop3}}"
    pop3FactoryPort = "${{env:SMTP_POP3_FACTORY_PORT:-3110}}"
    imapFactoryPort = "143"
    pop3FactoryFallback = "false"
    imapFactoryFallback = "false"
}

database {
    url = "${{env:POSTGRES_JDBC_URL:-}}"
    minimumIdleConnections = 1
    maxLifetimeConnections = 30001
    maxConnectionPoolSize = 4
    connectionTimeout = 250
    idleConnectionTimeout = 10001
    mountPath = "${{env:POSTGRES_MOUNT_PATH:-}}"
    userRole = "${{env:POSTGRES_USER_ROLE:-}}"
    adminRole = "${{env:POSTGRES_ADMIN_ROLE:-}}"
}

# OBS: Referanse til en annen config-variabel må være i små bokstaver!
azureAuth {
    azureAdAuth = "AZURE_AD"
    appName = "smtp-transport"
    azureMockPort = 3344
    naisClusterName = "${{ env:NAIS_CLUSTER_NAME :- dev-fss }}"
    azureAppTenantId = "${{ env:AZURE_APP_TENANT_ID :- ${{ ref:azureauth.azureadauth }} }}"
    azureOpenIdConfigTokenEndpoint = "${{ env:AZURE_OPENID_CONFIG_TOKEN_ENDPOINT :- http://localhost:${{ ref:azureauth.azuremockport }}/${{ ref:azureauth.azureadauth }}/token }}"
    azureWellKnownUrl = "${{ env:AZURE_APP_WELL_KNOWN_URL :- http://localhost:3344/${{ ref:azureauth.azureadauth }}/.well-known/openid-configuration }}"
    appScope = "${{ env:SMTP_TRANSPORT_SCOPE :- api://${{ ref:azureauth.naisclustername }}.team-emottak.${{ ref:azureauth.appname }}/.default }}"
    azureAppClientId = "${{ env:AZURE_APP_CLIENT_ID :- ${{ ref:azureauth.appscope }} }}"
}